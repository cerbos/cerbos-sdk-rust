---
on:
  workflow_dispatch:
  push:
    tags:
      - if-struct-macro-v*
      - v*

name: Release

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Check out sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Protoc
        uses: cerbos/actions/install-tools@bb5570805858670fd33787e9ded60b8c1140b2a1 # main
        with:
          tools: protoc

      - name: Install stable toolchain
        uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
        with:
          cache: false
          override: true
          components: rustfmt, clippy

      - name: Run cargo check
        run: cargo check

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      - name: Publish
        run: |
          case "${GITHUB_REF_NAME}" in
            if-struct-macro-v*)
              package="if-struct-macro"
              ;;

            v*)
              package="cerbos"
              ;;

            *)
              printf "::error::Tag %s does not correspond to a known package\n" "${GITHUB_REF_NAME}"
              ;;
          esac

          cargo publish --package "${package}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
